<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Comfort Systems Fan Club</title>
  <style>
    :root { color-scheme: light; --paper:#fbfbf7; --ink:#101512; --muted:#59615b; --line:rgba(16,21,18,.14); --green:#0f7f73; --blue:#1769aa; --red:#d43d3d; --gold:#c79721; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:var(--paper); color:var(--ink); font:14px/1.35 "Helvetica Neue", Arial, Helvetica, sans-serif; }
    button,a { font:inherit; color:inherit; } a { text-decoration:none; }
    .page { width:min(100%,1900px); margin:0 auto; padding:12px; }
    .topbar { position:sticky; top:0; z-index:20; display:flex; align-items:center; justify-content:space-between; gap:16px; padding:8px 0 10px; background:rgba(251,251,247,.94); backdrop-filter:blur(18px); border-bottom:1px solid rgba(16,21,18,.08); }
    .wordmark { display:flex; align-items:center; gap:12px; min-width:0; }
    .mark { position:relative; width:48px; height:48px; flex:0 0 auto; }
    .mark:before,.mark:after { content:""; position:absolute; inset:8px 13px; border:6px solid transparent; border-radius:50%; transform:rotate(38deg); }
    .mark:before { border-left-color:var(--blue); border-top-color:var(--blue); } .mark:after { border-right-color:var(--red); border-bottom-color:var(--red); transform:rotate(38deg) translate(4px,3px); }
    .brand { display:flex; align-items:baseline; gap:.38em; min-width:0; line-height:.9; text-transform:uppercase; white-space:nowrap; } .brand strong { font:950 clamp(30px,4.1vw,64px)/.9 "Arial Black", "Helvetica Neue Condensed Bold", "Helvetica Neue", Arial, Helvetica, sans-serif; letter-spacing:0; } .brand span { color:var(--muted); font:950 clamp(19px,2.4vw,39px)/.9 "Arial Black", "Helvetica Neue Condensed Bold", "Helvetica Neue", Arial, Helvetica, sans-serif; letter-spacing:0; }
    .join { display:inline-flex; align-items:center; justify-content:center; min-height:44px; padding:0 17px; border:1px solid rgba(16,21,18,.25); background:var(--ink); color:var(--paper); font-weight:950; text-transform:uppercase; letter-spacing:.08em; white-space:nowrap; }
    .tabs { display:flex; gap:8px; margin:10px 0; } .tab { border:1px solid var(--line); background:#fff; padding:9px 13px; cursor:pointer; font-weight:950; text-transform:uppercase; letter-spacing:.08em; } .tab.active { background:var(--ink); color:var(--paper); }
    .panel { display:none; } .panel.active { display:block; }
    .lead-grid { display:grid; grid-template-columns:1fr; gap:12px; align-items:stretch; }
    .chart-card,.hero-card { border:1px solid var(--line); background:#fff; overflow:hidden; }
    .chart-card { height:clamp(220px,calc((100vw - 24px) * .215625),410px); }
    .hero-card { height:clamp(460px,52vh,720px); }
    .chart-card { position:relative; }
    .ath-key { position:absolute; top:3px; right:12px; z-index:2; display:inline-flex; align-items:center; gap:7px; padding:6px 8px; background:rgba(251,251,247,.86); border:1px solid rgba(16,21,18,.12); font:950 11px/1 "Helvetica Neue", Arial, Helvetica, sans-serif; letter-spacing:.08em; text-transform:uppercase; }
    .ath-key:before { content:""; width:10px; height:10px; border-radius:50%; background:var(--red); box-shadow:0 0 0 2px #fff, 0 0 0 4px rgba(212,61,61,.26); }
    .fix-chart { width:100%; height:100%; display:block; }
    .chart-grid line { stroke:rgba(16,21,18,.10); stroke-width:1; } .chart-axis line { stroke:rgba(16,21,18,.52); stroke-width:2; } .chart-axis text,.chart-legend,.chart-year { font:900 14px Arial, Helvetica, sans-serif; fill:var(--muted); }
    .ath-dot { cursor:pointer; outline:none; } .ath-hit { fill:transparent; } .ath-core { fill:var(--red); stroke:#fff; stroke-width:2; } .ath-ring { fill:none; stroke:rgba(212,61,61,.35); stroke-width:2; } .ath-dot:hover .ath-core,.ath-dot:focus .ath-core,.ath-dot.active .ath-core { fill:var(--gold); r:7; } .ath-dot.active .ath-ring { stroke:var(--gold); stroke-width:4; }
    .hero-card { position:relative; display:grid; background:#0b0b09; } .hero-img { grid-area:1/1; width:100%; height:100%; object-fit:contain; opacity:0; transition:opacity .5s ease; background:#0b0b09; } .hero-img.active { opacity:1; }
    .hero-controls { position:absolute; left:10px; right:10px; bottom:10px; display:flex; justify-content:space-between; pointer-events:none; } .hero-controls button { pointer-events:auto; border:1px solid rgba(255,255,255,.35); color:#fff; background:rgba(0,0,0,.55); padding:8px 11px; cursor:pointer; font-weight:950; }
    .live-wall { display:grid; grid-template-columns:1.2fr .9fr 1fr .9fr; gap:12px; margin-top:12px; min-height:clamp(160px,22vh,280px); }
    .live-slot { position:relative; display:block; min-height:clamp(160px,22vh,280px); padding:0; border:1px solid var(--line); background:#0b0b09; overflow:hidden; cursor:pointer; }
    .live-slot.wide { grid-column:span 2; }
    .live-slot img { position:absolute; inset:0; width:100%; height:100%; object-fit:contain; opacity:0; animation:liveFade 24s infinite; background:#0b0b09; }
    .live-slot img:nth-child(1) { animation-delay:0s; } .live-slot img:nth-child(2) { animation-delay:6s; } .live-slot img:nth-child(3) { animation-delay:12s; } .live-slot img:nth-child(4) { animation-delay:18s; }
    @keyframes liveFade { 0%,18% { opacity:1; } 25%,93% { opacity:0; } 100% { opacity:1; } }
    .photos-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:12px; } .photo-tile { width:100%; margin:0; padding:0; border:1px solid var(--line); background:#0b0b09; cursor:pointer; display:grid; min-height:320px; } .photos-grid .photo-tile:not(.hd) { display:none; } .photo-tile img { width:100%; height:100%; max-height:72vh; object-fit:contain; display:block; }
    .lightbox { position:fixed; inset:0; z-index:80; display:none; place-items:center; padding:18px; background:rgba(0,0,0,.9); } .lightbox.open { display:grid; } .lightbox img { max-width:96vw; max-height:92vh; object-fit:contain; } .lightbox button { position:fixed; top:18px; right:18px; border:1px solid rgba(255,255,255,.25); background:#090b09; color:#fff; padding:9px 12px; cursor:pointer; text-transform:uppercase; font-weight:900; }
    @media (max-width:1000px) { .hero-card { height:clamp(320px,42vh,540px); } .live-wall { grid-template-columns:1fr 1fr; } .live-slot.wide { grid-column:span 2; } }
    @media (max-width:700px) { .chart-card { height:260px; } .hero-card { height:clamp(360px,52vh,520px); } }
    @media (max-width:700px) { .mark { width:38px; height:38px; } .brand strong { font-size:clamp(22px,7.2vw,34px); } .brand span { font-size:clamp(15px,4.6vw,22px); } .join { min-height:38px; padding:0 12px; } .live-wall { grid-template-columns:1fr; } .live-slot,.live-slot.wide { grid-column:auto; } }
    @media (max-height:760px) and (min-width:760px) { .topbar { padding:5px 0 7px; } .tabs { margin:8px 0; } .chart-card { min-height:200px; } .hero-card { height:38vh; min-height:260px; } .live-wall,.live-slot { min-height:140px; } }
  </style>

    const heroPhotos = [{"id": "hd_01", "src": "outputs/investor_relations/photos_hd/hd_photo_01.jpg"}, {"id": "hd_02", "src": "outputs/investor_relations/photos_hd/hd_photo_02.jpg"}, {"id": "hd_03", "src": "outputs/investor_relations/photos_hd/hd_photo_03.jpg"}, {"id": "hd_04", "src": "outputs/investor_relations/photos_hd/hd_photo_04.jpg"}, {"id": "hd_05", "src": "outputs/investor_relations/photos_hd/hd_photo_05.jpg"}, {"id": "hd_06", "src": "outputs/investor_relations/photos_hd/hd_photo_06.jpg"}, {"id": "hd_07", "src": "outputs/investor_relations/photos_hd/hd_photo_07.jpg"}, {"id": "hd_09", "src": "outputs/investor_relations/photos_hd/hd_photo_09.jpg"}, {"id": "hd_10", "src": "outputs/investor_relations/photos_hd/hd_photo_10.jpg"}, {"id": "hd_11", "src": "outputs/investor_relations/photos_hd/hd_photo_11.jpg"}, {"id": "hd_12", "src": "outputs/investor_relations/photos_hd/hd_photo_12.jpg"}, {"id": "hd_13", "src": "outputs/investor_relations/photos_hd/hd_photo_13.jpg"}];
    let heroIndex = 0;
    const heroEls = [...document.querySelectorAll('.hero-img')];
    function showHero(index) { heroIndex = (index + heroEls.length) % heroEls.length; heroEls.forEach((el, i) => el.classList.toggle('active', i === heroIndex)); }
    showHero(0);
    let timer = setInterval(() => showHero(heroIndex + 1), 4200);
    function bump(delta) { clearInterval(timer); showHero(heroIndex + delta); timer = setInterval(() => showHero(heroIndex + 1), 4200); }
    document.getElementById('prevHero').addEventListener('click', () => bump(-1));
    document.getElementById('nextHero').addEventListener('click', () => bump(1));
    document.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click', () => { document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b === btn)); document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === btn.dataset.tab)); }));
    function wireChartDots() {
      document.querySelectorAll('.ath-dot').forEach(dot => dot.addEventListener('click', () => showHero(Number(dot.dataset.index || 0) % heroEls.length)));
    }
    wireChartDots();
    async function refreshMarketChart() {
      if (location.protocol === 'file:') return;
      try {
        const response = await fetch('/api/chart.svg', { cache: 'no-store' });
        if (!response.ok) return;
        const template = document.createElement('template');
        template.innerHTML = (await response.text()).trim();
        const svg = template.content.querySelector('svg.fix-chart');
        if (svg) svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
        const current = document.querySelector('svg.fix-chart');
        if (svg && current) {
          current.replaceWith(svg);
          wireChartDots();
        }
      } catch (_) {}
    }
    refreshMarketChart();
    setInterval(refreshMarketChart, 6 * 60 * 60 * 1000);
    const box = document.getElementById('lightbox'); const boxImg = document.getElementById('boxImg');
    function openBox(src) { boxImg.src = src; box.classList.add('open'); }
    heroEls.forEach(img => img.addEventListener('click', () => openBox(img.src)));
    document.querySelectorAll('.photo-tile, .live-slot').forEach(tile => tile.addEventListener('click', () => openBox(tile.dataset.src)));
    document.getElementById('closeBox').addEventListener('click', () => box.classList.remove('open'));
    box.addEventListener('click', e => { if (e.target === box) box.classList.remove('open'); });
  </script>
</body>
